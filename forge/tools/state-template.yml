# ai-specs ticket lifecycle state file — TEMPLATE
#
# Schema:  ai-specs/schemas/state.schema.yml
# Helper:  ai-specs/tools/init-state.py
#
# Each ticket has ONE state file at:
#   ai-specs/changes/<module>/state/<TICKET-ID>.yml
#
# Initial state is `enriched` — the file is created by `/enrich-us` (or
# manually via `init-state.py`) AFTER enrichment completes. Subsequent
# lifecycle commands update the appropriate `steps.<phase>.done` flag and
# advance the top-level `state` enum.
#
# Replace the {{PLACEHOLDER}} tokens when instantiating. `init-state.py`
# does this automatically.

ticket: "{{TICKET}}"           # e.g., <TICKET-ID>
module: "{{MODULE}}"           # e.g., auth, framework, sat-cristian-garcia
sprint: "{{SPRINT}}"           # e.g., "internal cycle" or "framework release layer - ai-specs reinforce"

state: enriched                # advances monotonically: enriched -> planned ->
                               # developing -> verified -> committed ->
                               # documented -> closed

steps:

  enrich-us:
    done: true
    timestamp: "{{TIMESTAMP}}"  # ISO 8601 UTC, e.g., 2026-05-13T22:00:00Z
    # jira_hash: <sha>          # optional: SHA of the Jira description at enrichment time

  plan:
    done: false
    # populated by /plan:
    # timestamp: <iso>
    # path: changes/<m>/plans/<sprint>/<TICKET>_<scope>.md
    # schema_validated: true

  develop:
    done: false
    # populated by /develop:
    # timestamp: <iso>
    # branch: feature/<TICKET>-<scope>
    # last_commit: <sha>
    # plan_compliance_summary: { ... step:status map ... }

  verify:
    done: false
    # populated by /verify:
    # timestamp: <iso>
    # verdict: PASS | PASS-WITH-DEBT | BLOCKED-RISK | BLOCKED-GAP | BLOCKED-BUILD
    # path: changes/<m>/plans/<sprint>/<TICKET>_verify.md
    # schema_validated: true
    # deviations_count: <int>

  commit:
    done: false
    # populated by /commit:
    # timestamp: <iso>
    # pr: <pr-number>
    # merge_commit: <sha>
    # branch_deleted: true

  update-docs:
    done: false
    # populated by /update-docs:
    # timestamp: <iso>
    # record_path: changes/<m>/records/<sprint>/<TICKET>_<scope>.md
    # record_schema_validated: true
    # ai_specs_commit: <sha>
    # specs_updated: [list of spec files modified]

# ----- Optional, populated during lifecycle -----

# deviations: []   # one entry per deviation classified by /verify
                   # - step: <plan-step-id-or-number>
                   #   category: Accepted-Trivial | Accepted-Quality | Accepted-Risk | Deferred | Pre-existing | Scope-Gap
                   #   ref: <anchor-into-verify-or-record>
                   #   jira_ticket: <follow-up SCRUM-XXX if any>

# follow_ups: []   # one entry per recommended follow-up noted during /update-docs
                   # - title: <short>
                   #   status: not-created | draft | SCRUM-XXX
                   #   reason: <required if status=not-created>
                   #   source_section: <e.g., "Lessons Learned" or "Bugs Found">
