# Anti-Rot Allowlist Registry (<TICKET-ID> / framework release layer).
# Schema: forge/schemas/anti-rot-allowlist.schema.yml
#
# Documents intentional GRD findings that are accepted with mandatory expiration.
# Every entry MUST have `expires_at` — the allowlist is not a cemetery.

version: "1.0"
allowlist:
  - file: forge/.playbooks/
    pattern: "^forge/specs/(api-spec\\.yml|data-model\\.md|ui-design-system\\.md)$"
    kind: broken-path
    reason: "Symbolic refs to product specs (post <TICKET-ID> cross-repo migration); resolved via LIFECYCLE_ROOT in governed projects."
    expires_at: 2026-08-28

  - file: forge/.agents/
    pattern: "^forge/specs/(api-spec\\.yml|data-model\\.md|ui-design-system\\.md)$"
    kind: broken-path
    reason: "Same symbolic convention as playbooks; agent personas reference product specs by canonical path."
    expires_at: 2026-08-28

  - file: forge/specs/workflow-standards.mdc
    pattern: "^forge/specs/(api-spec\\.yml|data-model\\.md|ui-design-system\\.md)$"
    kind: broken-path
    reason: "Engine spec references product specs by canonical path; same symbolic convention."
    expires_at: 2026-08-28

  - file: forge/_parked/specs/audit-standards.mdc
    pattern: "^forge/specs/(api-spec\\.yml|data-model\\.md|ui-design-system\\.md)$"
    kind: broken-path
    reason: "Engine spec references product specs by canonical path; same symbolic convention. Spec parked per ADR-011 (<TICKET-ID> framework release layer) — entry retained for unparking-readiness."
    expires_at: 2026-08-28

  - file: README.md
    pattern: "^forge/specs/(api-spec\\.yml|data-model\\.md|ui-design-system\\.md)$"
    kind: broken-path
    reason: "Root README references product specs that live in <project>/.lifecycle/specs/."
    expires_at: 2026-08-28

  - file: INSTALL.md
    pattern: "^forge/specs/(api-spec\\.yml|data-model\\.md|ui-design-system\\.md)$"
    kind: broken-path
    reason: "INSTALL guide references product specs symbolically."
    expires_at: 2026-08-28

  - file: forge/specs/base-standards.mdc
    pattern: "^lifecycle/specs/.+\\.(mdc|md)$"
    kind: broken-md-link
    reason: "Symbolic refs to spec files under LIFECYCLE_ROOT/.lifecycle/specs/ (<TICKET-ID> convention)."
    expires_at: 2026-08-28
